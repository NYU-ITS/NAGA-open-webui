server {
    listen 80;
    root /usr/share/nginx/html;

    # ── Backend proxy routes ──────────────────────────────────────────────────
    # All API, WebSocket, and model-provider routes are forwarded to the
    # backend pod via the internal K8s ClusterIP service.

    location /api {
        proxy_pass http://open-webui-service.open-webui.svc.cluster.local:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow large file uploads (e.g. document RAG)
        client_max_body_size 100M;
    }

    location /ollama {
        proxy_pass http://open-webui-service.open-webui.svc.cluster.local:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openai {
        proxy_pass http://open-webui-service.open-webui.svc.cluster.local:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend static assets (favicon, logos, uploads — served by FastAPI, not SvelteKit)
    location /static {
        proxy_pass http://open-webui-service.open-webui.svc.cluster.local:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket (chat streaming)
    location /ws {
        proxy_pass http://open-webui-service.open-webui.svc.cluster.local:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── SvelteKit static frontend ─────────────────────────────────────────────
    # Serve static files directly; fall back to index.html for client-side
    # routing (SvelteKit handles the route internally in the browser).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
